name: publish pin-point

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @tonytangdev/pin-point build

      - run: pnpm --filter @tonytangdev/pin-point test

      - run: cd packages/pin-point && npm publish --provenance --access public
